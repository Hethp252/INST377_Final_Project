<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- JS Library 1: Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="active">Home</a>
        <a href="project.html">Dashboard</a>
        <a href="about.html">About</a>
    </nav>
    <main class="container dashboard-grid">
        <section class="search-section">
            <h2>Market Lookup</h2>
            <div class="search-box">
                <input type="text" id="tickerInput" placeholder="e.g. AAPL, TSLA, MSFT">
                <button onclick="fetchStockData()">Analyze</button>
            </div>
            
            <div id="stockDetails" class="stock-card hidden">
                <h3 id="displayTicker">---</h3>
                <p>Prior Close: <span id="closePrice">$0.00</span></p>
                <button id="saveBtn" class="btn-secondary">Add to Watchlist</button>
            </div>
        </section>

        <section class="chart-section">
            <h2>Performance Metrics</h2>
            <div class="chart-container">
                <canvas id="stockChart"></canvas>
            </div>
        </section>

        <section class="watchlist-section">
            <h2>Database Watchlist</h2>
            <ul id="watchlistItems">
                <!-- Dynamically populated from Supabase -->
            </ul>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
