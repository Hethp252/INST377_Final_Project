<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Tracker - Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <!-- JS Library 1: Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/index.html">Home</a>
        <a href="/about.html">About</a>
        <a href="/project.html" class="active">Dashboard</a>
    </nav>

    <main class="container">
        <!-- 1. Search Box -->
        <section style="background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
            <h2>Step 1: Market Lookup</h2>
            <input type="text" id="tickerInput" placeholder="Enter Ticker (e.g. AAPL)" style="padding: 8px; width: 200px;">
            <button onclick="fetchStockData()" style="padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer;">Analyze</button>
        </section>

        <!-- 2. Results & Save Button (Hidden until searched) -->
        <section id="stockDetails" style="background: #eff6ff; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: none;">
            <h2>Step 2: Action</h2>
            <h3 id="displayTicker" style="margin-bottom: 10px;">---</h3>
            <p style="margin-bottom: 10px;">Current Price: <span id="closePrice">$0.00</span></p>
            <button id="saveBtn" style="padding: 8px 16px; background: #059669; color: white; border: none; border-radius: 4px; cursor: pointer;">Add to Database Watchlist</button>
            
            <div style="height: 300px; margin-top: 20px;">
                <canvas id="stockChart"></canvas>
            </div>
        </section>

        <!-- 3. The Supabase Watchlist -->
        <section style="background: white; padding: 20px; border-radius: 8px;">
            <h2>Step 3: Your Saved Watchlist</h2>
            <p>These stocks are pulled directly from your Supabase Database.</p>
            <ul id="watchlistItems" style="list-style: none; display: flex; gap: 10px; margin-top: 10px;">
                <!-- DB items will appear here -->
            </ul>
        </section>
    </main>

    <!-- Connects to your script.js -->
    <script src="/script.js"></script>
</body>
</html>
